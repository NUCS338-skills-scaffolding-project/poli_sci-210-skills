course_id: "POLISCI-210"
course_name: "Introduction to Empirical Methods in Political Science"
course_type: "humanities"
spoc_contact: "bryanmurray2026@u.northwestern.edu"
# skills_used: skills adopted from OTHER teams' repos.
# Skills authored in this repo (under /skills/) are picked up automatically.
skills_used: []

# ---------------------------------------------------------------------------
# course_context — values that course-specific skills reference at runtime so
# the skills.md files can stay course-agnostic. Adopting teams customize this
# block. Skills fall back gracefully when a key is missing or empty.
# ---------------------------------------------------------------------------
course_context:
  # Short tag the tutor uses when referring to "the textbook" mid-conversation.
  # Read by: quiz-prep, eval-ai-response, comp-check.
  textbook_short: "EMPS"
  textbook_full: "Empirical Methods in Political Science"

  # Course's stated learning objectives. Read by: tie-to-course.
  # An adopting team replaces this list with its own. If the list is empty
  # or missing, tie-to-course falls back to asking the student to name
  # their course's objectives from the syllabus.
  learning_objectives:
    - "Explain descriptive vs. causal inference and its challenges"
    - "Evaluate inferential claims in research"
    - "Identify research designs and their strengths/weaknesses"
    - "Communicate research findings clearly"

  # Weeks the course is in session (class meets). Note this is distinct
  # from "weeks assignments are due" — week 1 has class but no AI memo /
  # RDC assignment, for example.
  # Read by: pick-week-concept (week-validity gate, against this list).
  # Other skills (e.g., critique-design's WEEK_METHOD) constrain to a
  # narrower assignment-bearing range as needed.
  weeks_in_session: [1, 2, 3, 4, 5, 6, 7, 8, 9]

  # Evaluative questions used as section anchors when scaffolding an AI memo.
  # Read by: ai-memo (Step 6, when handing off to scaffold-writing).
  # An adopting team replaces this list with its own assignment rubric.
  # If missing or empty, ai-memo falls back to the defaults documented in
  # its skills.md (POLI SCI 210's syllabus shape).
  ai_memo_evaluative_questions:
    - "What did you ask the AI and what did it say?"
    - "How does that compare to the course material?"
    - "Why is it different / more or less helpful?"
    - "Are the AI's recommended sources credible?"

  # Section structure + word count for the Research Design Critique (RDC)
  # assignment, used as section anchors when scaffolding an RDC. Read by:
  # scaffold-writing (Step 3, when called from the critique-design chain).
  # An adopting team replaces this with its own RDC assignment shape; if
  # missing or empty, scaffold-writing falls back to the POLI SCI 210
  # defaults documented inline.
  rdc_structure:
    word_count_min: 700
    word_count_max: 1000
    sections:
      - "Question and relevance"
      - "Research design (as the authors did it)"
      - "Their critique (main point + evidence)"
      - "What they'd change"

  # Research methods recognized by the RDC chain's validators and the
  # per-method content in 10 RDC skills (catalogs, checklists, focus areas,
  # locus expectations, etc.). This is the canonical list. Each affected
  # logic.py reads `id` values from this list at module load and uses them
  # as the source of truth for VALID_METHODS, with a hard-coded POLI SCI 210
  # default as a defensive fallback when metadata is unreadable.
  #
  # Each entry has:
  #   - id: kebab-case tag used in code and inline references (load-bearing)
  #   - label: human-readable name (informational; for adopter docs / future UI use)
  #
  # An adopting team replaces this list to match their course's methodological
  # coverage; the in-skill prose content (per-method nudges) still requires
  # adopter edits skill-by-skill — see cross-cutting.md CC-2 for the full
  # refactor proposal that would parameterize the prose too. Backward
  # compatibility: each logic.py also accepts a bare-string list form
  # (`research_methods: ["theory-data", ...]`) if the adopter doesn't need
  # labels.
  research_methods:
    - {id: "theory-data",      label: "Theory & Data"}
    - {id: "inference",        label: "Causal Inference"}
    - {id: "surveys",          label: "Surveys"}
    - {id: "experiments",      label: "Experiments"}
    - {id: "large-n",          label: "Large-N Quantitative"}
    - {id: "small-n",          label: "Small-N Qualitative"}
    - {id: "machine-learning", label: "Machine Learning"}

  # Per-week syllabus mapping for the Research Design Critique (RDC) chain.
  # Each entry binds a course week to the method tag and the specific paper
  # the student critiques that week. Read by: critique-design/logic.py
  # (WEEK_METHOD), which uses the mapping to route the student through the
  # appropriate phase-orchestrator inputs.
  #
  # Each entry has:
  #   - week: int (the in-session week, must appear in weeks_in_session above)
  #   - method: one of the `id` values from research_methods above
  #   - paper_short: human-readable short citation, e.g. "Author Year"
  #
  # An adopting team replaces this list with its own RDC assignment schedule.
  # If missing, malformed, or empty, critique-design falls back to the
  # POLI SCI 210 default mapping hard-coded in its logic.py.
  rdc_syllabus:
    - {week: 3, method: "theory-data",      paper_short: "Krcmaric, Nelson & Roberts 2024"}
    - {week: 4, method: "inference",        paper_short: "Rosenzweig & Wilson 2023"}
    - {week: 5, method: "surveys",          paper_short: "Naunov 2025"}
    - {week: 6, method: "experiments",      paper_short: "Coppock, Green & Porter 2026"}
    - {week: 7, method: "large-n",          paper_short: "Harbridge-Yong, Volden & Wiseman 2023"}
    - {week: 8, method: "small-n",          paper_short: "Gilbert 2022"}
    - {week: 9, method: "machine-learning", paper_short: "Libgober & Jerzak 2024"}

# ---------------------------------------------------------------------------
# paths — filesystem conventions for course materials and per-student outputs.
# All paths are relative to the repo root. Skills fall back to host-runtime
# defaults (working memory, /tmp, or the host's working directory) when a
# referenced path is missing or unwritable.
# ---------------------------------------------------------------------------
paths:
  materials_root: "materials"
  slide_filename_pattern: "materials/slides/week{N}-slides.pdf"
  students_root: "students"
  student_session_log_pattern: "students/{student}/session-logs/{date}-{topic}.md"
  student_ai_memo_transcript_pattern: "students/{student}/ai-memos/week-{N}-{slug}-transcript.md"
  student_submissions_root: "students/{student}/submissions"
  scratch_pattern: "skills/{skill_id}/scratch/{timestamp}-{student}-notes.md"

# Default student name used when no <student> token is set explicitly.
# Set to null to require an explicit student each session.
default_student: null
